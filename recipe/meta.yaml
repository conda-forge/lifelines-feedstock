{% set name = "lifelines" %}


{% set version = "0.30.3" %}
{% set sha256 = "28811893a32851a45d593980d5076348cb0f60ca438e7bd9c1e9fa67132c7eee" %}



package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://github.com/CamDavidsonPilon/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools

  run:
    - python >={{ python_min }}
    - numpy >=1.14.0
    - scipy >=1.7
    - pandas >=2.1,<3.0
    - matplotlib-base >=3.0
    - autograd >=1.5
    - autograd-gamma >=0.3
    - formulaic >=0.2.2

test:
  requires:
    - python {{ python_min }}
  imports:
    - lifelines
    - lifelines.datasets
    - lifelines.fitters
    - lifelines.utils

about:
  home: https://github.com/CamDavidsonPilon/lifelines
  license: MIT
  license_file: LICENSE
  summary: Survival analysis in Python, including Kaplan Meier, Nelson Aalen and regression

extra:
  recipe-maintainers:
    - mariusvniekerk
    - CamDavidsonPilon
